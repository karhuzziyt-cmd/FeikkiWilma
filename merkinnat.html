<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Wilma - Merkintä paneeli</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: 0 auto 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #003366; border-bottom: 2px solid #003366; padding-bottom: 10px; }
        label { font-size: 12px; color: #666; font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .color-input { height: 50px; cursor: pointer; padding: 5px; }
        
        button { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #002244; }
        
        /* Google-painike ja erotin */
        .separator { margin: 20px 0; color: #666; font-size: 13px; display: flex; align-items: center; text-align: center; }
        .separator::before, .separator::after { content: ""; flex: 1; border-bottom: 1px solid #ccc; }
        .separator:not(:empty)::before { margin-right: .25em; }
        .separator:not(:empty)::after { margin-left: .25em; }

        .google-btn { 
            width: 100%; background: #f5f5f5; border: 1px solid #ccc; padding: 10px; border-radius: 5px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-weight: normal; font-size: 14px; color: #333;
        }
        .google-btn:hover { background: #e8e8e8; }

        .tab-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab-btn { background: #ddd; color: black; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #003366; color: white; }
        
        .user-banner { display: flex; justify-content: space-between; align-items: center; background: #e5e5ea; padding: 10px; border-radius: 5px; max-width: 500px; margin: 0 auto 20px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="authCard" class="card">
        <h2>Kirjaudu Sisään samalla tilillä</h2>
        <label>Sähköposti</label>
        <input type="email" id="loginEmail" placeholder="ope@koulu.fi">
        <label>Salasana</label>
        <input type="password" id="loginPassword" placeholder="Kirjoita salasana">
        <button id="loginBtn" onclick="handleLogin()">KIRJAUDU SISÄÄN</button>
        
        <div class="separator">tai</div>

        <button class="google-btn" id="googleLoginBtn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Jatka Googlella
        </button>

        <p id="authStatus" style="color: red; font-size: 14px; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="panelContent" style="display: none;">
        <div class="user-banner">
            <span>Kirjautuneena: <b id="currentUserEmail"></b></span>
            <button style="cursor:pointer; padding: 4px 8px;" onclick="handleLogout()">Kirjaudu ulos</button>
        </div>

        <div class="tab-btns">
            <div id="btn1" class="tab-btn active" onclick="showTab('merkinta')">Uusi merkintä</div>
            <div id="btn2" class="tab-btn" onclick="showTab('viesti')">Luo uusi viesti</div>
        </div>

        <div id="tabMerkinta" class="card">
            <h2>Uusi Wilma-merkintä</h2>
            
            <label>Oppilaan sähköposti</label>
            <input type="email" id="targetEmail" placeholder="esim. oppilas@koulu.fi">
            
            <label>Opettajan nimi</label>
            <input type="text" id="teacherName" placeholder="esim. Opettaja Virtanen">
            
            <label>Oppiaine</label>
            <input type="text" id="subject" placeholder="esim. Matematiikka">
            
            <label>Merkinnän aihe (esim. Huomautus, Kiitos, Myöhästyminen)</label>
            <input type="text" id="reason" placeholder="Kirjoita merkinnän otsikko">

            <label>Kesto (Duration - esim. 45 tai 75)</label>
            <input type="number" id="duration" placeholder="Minuutit">
            
            <label>Valitse merkinnän väri</label>
            <input type="color" id="colorPicker" class="color-input" value="#d32f2f">
            
            <label>Lisätiedot / Kommentti</label>
            <textarea id="comment" rows="4" placeholder="Kirjoita vapaamuotoinen palaute tähän..."></textarea>
            
            <button onclick="sendNote()">LÄHETÄ MERKINTÄ</button>
        </div>

        <div id="tabViesti" class="card" style="display:none;">
            <h2>Luo uusi viesti</h2>
            <label>Vastaanottajan sähköposti</label>
            <input type="email" id="msgTarget" placeholder="oppilas@koulu.fi">
            
            <label>Lähettäjän nimi</label>
            <input type="text" id="msgSender" placeholder="Opettaja Virtanen">
            
            <label>Aihe</label>
            <input type="text" id="msgSubject" placeholder="Viestin otsikko">
            
            <label>Viestin sisältö</label>
            <textarea id="msgBody" rows="6" placeholder="Kirjoita viestin sisältö tähän..."></textarea>
            
            <button onclick="sendMessage()" style="background: #28a745;">LÄHETÄ VIESTI</button>
        </div>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlxlTgDtU6-GgDTnoPFOgpgMXp1yiIfzc",
            authDomain: "feikkiwilma.firebaseapp.com",
            projectId: "feikkiwilma",
            storageBucket: "feikkiwilma.firebasestorage.app",
            messagingSenderId: "946459736703",
            appId: "1:946459736703:web:2850eb486d2477ebe41d4a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // KIRJAUTUMISEN HOITAVA FUNKTIO
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const statusText = document.getElementById('authStatus');

            if (!email || !pass) {
                statusText.innerText = "Täytä sähköposti ja salasana!";
                return;
            }

            try {
                statusText.style.color = "orange";
                statusText.innerText = "Kirjaudutaan sisään...";
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                statusText.style.color = "red";
                statusText.innerText = "Virhe: " + e.message;
            }
        };

        // GOOGLE-KIRJAUTUMINEN
        window.handleGoogleLogin = async () => {
            const statusText = document.getElementById('authStatus');
            try {
                statusText.style.color = "orange";
                statusText.innerText = "Avataan Google-kirjautumista...";
                await signInWithPopup(auth, provider);
            } catch (e) {
                statusText.style.color = "red";
                statusText.innerText = "Google-virhe: " + e.message;
            }
        };

        // ULOSKIRJAUTUMINEN
        window.handleLogout = () => {
            signOut(auth);
        };

        // TÄMÄ TARKISTAA ONKO OPETTAJA KIRJAUTUNUT JA AVAA SIVUN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authCard').style.display = 'none';
                document.getElementById('panelContent').style.display = 'block';
                document.getElementById('currentUserEmail').innerText = user.email;
                document.getElementById('authStatus').innerText = ""; // Tyhjennetään mahdolliset virheet kankaalta
            } else {
                document.getElementById('authCard').style.display = 'block';
                document.getElementById('panelContent').style.display = 'none';
            }
        });

        window.showTab = (tab) => {
            document.getElementById('tabMerkinta').style.display = tab === 'merkinta' ? 'block' : 'none';
            document.getElementById('tabViesti').style.display = tab === 'viesti' ? 'block' : 'none';
            document.getElementById('btn1').classList.toggle('active', tab === 'merkinta');
            document.getElementById('btn2').classList.toggle('active', tab === 'viesti');
        };

        window.sendNote = async () => {
            const email = document.getElementById('targetEmail').value.toLowerCase().trim();
            const teacher = document.getElementById('teacherName').value;
            const reason = document.getElementById('reason').value;
            const duration = document.getElementById('duration').value;
            const color = document.getElementById('colorPicker').value;

            if (!email || !reason) {
                alert("Täytä vähintään sähköposti ja aihe!");
                return;
            }

            try {
                await addDoc(collection(db, "merkinnat"), {
                    targetEmail: email,
                    teacher: teacher,
                    subject: document.getElementById('subject').value,
                    reason: reason,
                    duration: duration,
                    comment: document.getElementById('comment').value,
                    color: color,
                    date: serverTimestamp()
                });
                alert("Merkintä lähetetty onnistuneesti!");
                document.getElementById('reason').value = "";
                document.getElementById('duration').value = "";
                document.getElementById('comment').value = "";
            } catch (e) {
                alert("Virhe lähetyksessä: " + e.message);
            }
        };

        window.sendMessage = async () => {
            const email = document.getElementById('msgTarget').value.toLowerCase().trim();
            const sender = document.getElementById('msgSender').value;
            const subject = document.getElementById('msgSubject').value;

            if (!email || !subject) {
                alert("Täytä vähintään sähköposti ja aihe!");
                return;
            }

            try {
                await addDoc(collection(db, "viestit"), {
                    targetEmail: email,
                    sender: sender,
                    subject: subject,
                    body: document.getElementById('msgBody').value,
                    date: serverTimestamp()
                });
                alert("Viesti lähetetty onnistuneesti!");
                document.getElementById('msgSubject').value = "";
                document.getElementById('msgBody').value = "";
            } catch (e) {
                alert("Virhe lähetyksessä: " + e.message);
            }
        };
    </script>
</body>
</html>
